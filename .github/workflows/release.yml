name: Build and Release

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Configure CMake
        run: cmake -B build

      - name: Build
        run: cmake --build build --target rosettax87 --parallel

      - name: Verify binaries
        run: |
          echo "=== rosettax87 ==="
          file build/bin/rosettax87

      - name: Package artifacts
        run: |
          mkdir -p release
          cp build/bin/rosettax87 release/
          cd release
          tar czf ../rosettax87-jit-macos-arm64.tar.gz .

      - name: Update latest release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ github.sha }})
          prerelease: true
          make_latest: false
          files: |
            rosettax87-jit-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: rosettax87_jit ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            rosettax87-jit-macos-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
